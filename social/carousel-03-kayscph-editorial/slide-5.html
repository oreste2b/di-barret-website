<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<title>KAYs · Slide 5 · Quick wins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="editorial.css">
<style>
  .qw-list {
    margin-top: 32px;
    border-top: 2px solid currentColor;
    padding-top: 12px;
  }
  .qw-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid rgba(10,10,10,0.18);
  }
  .qw-item:last-child { border-bottom: 0; }
  .qw-item .label {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.015em;
    line-height: 1.15;
  }
  .qw-item .time {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.7;
    white-space: nowrap;
  }
  .qw-result {
    margin-top: 28px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: 34px;
    letter-spacing: -0.015em;
    line-height: 1.2;
  }
</style>
</head>
<body>
<div class="slide olive">
  <div class="slide__frame">
    <div class="slide__topmark">
      <div>QUICK WINS<br>03 STK · 3 TIMER</div>
      <div class="stamp"><span>Før fyraften</span><span>i dag</span></div>
    </div>

    <div class="slide__main">
      <div class="slide__headline compact" style="margin-bottom:0">
        Tre fixes.<br>
        <span style="font-style:italic;opacity:.7">Tre timer.</span>
      </div>

      <div class="qw-list">
        <div class="qw-item">
          <div class="label">Ret title-typoen + sæt H1 i Divi</div>
          <div class="time">30 min</div>
        </div>
        <div class="qw-item">
          <div class="label">Alt-tekst på de syv tomme billeder</div>
          <div class="time">60 min</div>
        </div>
        <div class="qw-item">
          <div class="label">Restaurant JSON-LD via Yoast Local</div>
          <div class="time">90 min</div>
        </div>
      </div>

      <div class="qw-result">Score 38 → ~50. Inden i morgen.</div>
    </div>

    <div class="slide__footer">
      <div class="credit">Effekt synlig i Google på en uge</div>
      <div class="counter">05 / 06</div>
    </div>
  </div>
</div>
</body>
</html>
