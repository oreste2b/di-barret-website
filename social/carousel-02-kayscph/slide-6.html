<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<title>KAYs Audit · Slide 6 · CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../social.css">
<style>
  .cta-label {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 32px;
  }
  .cta-headline {
    font-family: var(--display);
    font-size: 76px;
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1.0;
    color: var(--ink);
    margin-bottom: 48px;
    max-width: 880px;
  }
  .cta-headline .dim { color: var(--ink-muted); }
  .cta-url {
    font-family: var(--display);
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.0;
    color: var(--accent-green);
    padding: 36px 40px;
    background: rgba(52,211,153,0.08);
    border-left: 4px solid var(--accent-green);
    word-break: break-all;
  }
  .cta-url .slash { color: var(--ink-faint); margin: 0 6px; }
  .cta-meta {
    margin-top: 36px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
  }
  .cta-meta-item {
    padding: 20px 24px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .cta-meta-item .key {
    display: block;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .cta-meta-item .val {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide__header">
    <div class="slide__brand"><span class="slash">/</span>Di Barret</div>
    <div class="slide__kicker">Hele auditen</div>
  </div>

  <div class="slide__main">
    <div class="cta-label">Læs den fulde rapport</div>
    <div class="cta-headline">
      14 verificerbare findings.<br>
      <span class="dim">Plan A / B / C. Klar at sende videre.</span>
    </div>
    <div class="cta-url">
      dibarret.dk<span class="slash">/</span>audit-kayscph
    </div>
    <div class="cta-meta">
      <div class="cta-meta-item">
        <span class="key">Findings</span>
        <span class="val">14</span>
      </div>
      <div class="cta-meta-item">
        <span class="key">Sektor</span>
        <span class="val">Café</span>
      </div>
      <div class="cta-meta-item">
        <span class="key">Sprog</span>
        <span class="val">Dansk</span>
      </div>
    </div>
  </div>

  <div class="slide__footer">
    <div class="slide__meta">Uafhængig audit · Di Barret · København</div>
    <div class="slide__counter"><strong>06</strong> / 06</div>
  </div>
</div>
</body>
</html>
