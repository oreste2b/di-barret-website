<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<title>KAYs Audit · Slide 4 · Title typo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../social.css">
<style>
  .title-mock {
    margin-top: 24px;
    padding: 36px 40px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line-mid);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 32px;
    line-height: 1.4;
    color: var(--ink);
  }
  .title-mock .tag { color: var(--ink-faint); }
  .title-mock .bad { color: var(--accent-red); font-weight: 500; text-decoration: underline; text-decoration-color: var(--accent-red); text-underline-offset: 4px; }
  .pluskommentar {
    font-family: var(--body);
    font-size: 24px;
    line-height: 1.5;
    color: var(--ink-muted);
    margin-top: 28px;
    max-width: 880px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide__header">
    <div class="slide__brand"><span class="slash">/</span>Di Barret</div>
    <div class="slide__kicker">Finding · 02</div>
  </div>

  <div class="slide__main">
    <div class="slide__stat-label">Title-elementet · forside</div>
    <div class="slide__hero">
      <span class="small">Købmand</span><br>
      <span class="small">og</span> <span class="red small">kaf.</span>
    </div>
    <div class="title-mock">
      <span class="tag">&lt;title&gt;</span>Kays | Købmand og <span class="bad">kaf</span><span class="tag">&lt;/title&gt;</span>
    </div>
    <p class="pluskommentar">
      "Kaf" er ikke et dansk ord. Det er det første Google og browseren ser.
    </p>
  </div>

  <div class="slide__footer">
    <div class="slide__meta">Det første indtryk i Google</div>
    <div class="slide__counter"><strong>04</strong> / 06</div>
  </div>
</div>
</body>
</html>
